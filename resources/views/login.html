<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UMLab Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            overflow: hidden;
        }

        /* LEFT SIDE */
        .left-panel {
            background: linear-gradient(160deg, #000000 40%, #1e4ed8 70%, #e5e7eb 100%);
            color: white;
            position: relative;
        }

        .brand-text {
            font-size: 48px;
            font-weight: 700;
        }

        .vertical-line {
            width: 3px;
            height: 120px;
            background: white;
            margin: 40px auto 0;
        }

        /* RIGHT SIDE */
        .right-panel {
            background-color: #f8f9fa;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2563eb;
        }

        .btn-primary {
            background-color: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ccc;
        }

        .divider:not(:empty)::before {
            margin-right: .75em;
        }

        .divider:not(:empty)::after {
            margin-left: .75em;
        }

        @media (max-width: 992px) {
            .left-panel {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid h-100">
    <div class="row h-100">

        <!-- LEFT SIDE -->
        <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center left-panel">
            <div class="text-center">
                <div class="brand-text">UMLab</div>
                <div class="vertical-line"></div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-lg-6 d-flex align-items-center justify-content-center right-panel">
            <div class="login-card">

                <h3 class="fw-bold">Hi!</h3>
                <p class="text-muted mb-4">Let’s start your UML Class Diagram journey</p>

                <!-- Email -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control is-invalid" value="althafulhaq.xyz">
                    </div>
                    <div class="invalid-feedback d-block">
                        Please enter a valid email address.
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" placeholder="Enter your password">
                        <span class="input-group-text">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>
                </div>

                <!-- Remember + Forgot -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label small">Remember me</label>
                    </div>
                    <a href="#" class="small text-decoration-none">Forgot Password</a>
                </div>

                <!-- Login Button -->
                <div class="d-grid mb-3">
                    <button class="btn btn-primary btn-lg">Login</button>
                </div>

                <!-- Divider -->
                <div class="divider text-muted small">or</div>

                <!-- Google Button -->
                <div class="d-grid mb-3">
                    <button class="btn btn-outline-primary">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg"
                             width="20" class="me-2">
                        Sign in with Google
                    </button>
                </div>

                <p class="text-center small">
                    Don’t have an account?
                    <a href="#" class="text-decoration-none fw-semibold">Sign up here</a>
                </p>

            </div>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Courses & Notes Tabs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .custom-tabs {
            background-color: #1e63ff;
            border-radius: 16px;
            padding: 6px;
            width: fit-content;
        }

        .custom-tabs .nav-link {
            color: #fff;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 32px;
        }

        .custom-tabs .nav-link.active {
            background-color: #fff;
            color: #1e63ff;
        }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">

    <!-- NAV TABS -->
    <ul class="nav nav-pills custom-tabs mb-4" role="tablist">
        <li class="nav-item">
            <button
                class="nav-link active"
                data-bs-toggle="pill"
                data-bs-target="#courses"
                type="button"
                role="tab">
                Courses
            </button>
        </li>
        <li class="nav-item">
            <button
                class="nav-link"
                data-bs-toggle="pill"
                data-bs-target="#notes"
                type="button"
                role="tab">
                Notes
            </button>
        </li>
    </ul>

    <!-- TAB CONTENT -->
    <div class="tab-content bg-white p-4 rounded shadow-sm">

        <!-- COURSES -->
        <div class="tab-pane fade show active" id="courses" role="tabpanel">
            <h5 class="fw-bold mb-3">Daftar Courses</h5>

            <div class="card mb-3 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <span>Pengantar UML & Diagram Kelas</span>
                    <button class="btn btn-outline-primary btn-sm">Mulai</button>
                </div>
            </div>

            <div class="card mb-3 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <span>Alat Pemodelan UML & Persiapan</span>
                    <button class="btn btn-outline-primary btn-sm">Mulai</button>
                </div>
            </div>
        </div>

        <!-- NOTES -->
        <div class="tab-pane fade" id="notes" role="tabpanel">
            <h5 class="fw-bold mb-3">Catatan Saya</h5>

            <ul class="list-group">
                <li class="list-group-item">
                    UML adalah standar pemodelan sistem berbasis objek.
                </li>
                <li class="list-group-item">
                    Class Diagram terdiri dari atribut dan operasi.
                </li>
                <li class="list-group-item">
                    Relasi umum: asosiasi, agregasi, komposisi.
                </li>
            </ul>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
